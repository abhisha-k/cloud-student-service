apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-student-abhisha
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-student-abhisha
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-student-abhisha
    spec:
      containers:
      - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/abhisha-student:latest
        imagePullPolicy: Always
        name: app-student-abhisha
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-student-abhisha
spec:
  selector:
    app.kubernetes.io/name: app-student-abhisha
  ports:
    - port: 3000        # external service port
      targetPort: 3000  # matches containerPort in Deployment
      protocol: TCP
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-student-abhisha
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: "3000"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: service-student-abhisha
              port:
                number: 3000

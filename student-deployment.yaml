apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-student-abhisha
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-student-abhisha
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-student-abhisha
    spec:
      containers:
      - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/abhisha-student:latest
        imagePullPolicy: Always
        name: app-student-abhisha
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-student-abhisha
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-student-abhisha
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-student-abhisha
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: service-student-abhisha
              port:
                number: 80
                  